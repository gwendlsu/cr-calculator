<!DOCTYPE html>
<html>
<head>
  <title>Collection Receipt Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 420px;
      margin: 20px auto;
    }

    input, select, button {
      width: 100%;
      padding: 8px;
      margin: 10px 0;
      font-size: 16px;
    }

    button {
      cursor: pointer;
    }

    .result {
      margin-top: 15px;
      line-height: 1.8;
      border-top: 1px solid #000;
      padding-top: 10px;
    }

    .result p {
      display: flex;
      justify-content: space-between;
      font-family: monospace;
      margin: 4px 0;
    }

    .result span {
      min-width: 140px;
      text-align: right;
      display: inline-block;
    }

    .words {
      margin-top: 10px;
      font-style: italic;
      font-family: Arial;
    }
  </style>
</head>
<body>

  <h3>Collection Receipt Calculator</h3>

  <label>Total Sales:</label>
  <input type="text" id="totalSales" placeholder="₱ Enter total sales">

  <label>EWT Rate:</label>
  <select id="ewtRate">
    <option value="0.01">1%</option>
    <option value="0.02">2%</option>
  </select>

  <button onclick="calculate()">Calculate</button>

  <div class="result">
    <p>Vatable Sale <span id="vatable">-</span></p>
    <p>Add: VAT <span id="vat">-</span></p>
    <p>Total Sales <span id="total">-</span></p>
    <p>Less: EWT <span id="ewt">-</span></p>
    <p><strong>Final CR <span id="final">-</span></strong></p>
    <p class="words">In words: <span id="finalWords">-</span></p>
  </div>

  <script>
    // Auto-format input with commas
    document.getElementById("totalSales").addEventListener("input", function(e) {
      let value = e.target.value.replace(/,/g, "");

      if (!isNaN(value) && value !== "") {
        e.target.value = Number(value).toLocaleString("en-PH");
      }
    });

    // Enter key support
    document.getElementById("totalSales").addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        calculate();
      }
    });

    function formatPeso(value) {
      return value.toLocaleString("en-PH", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function calculate() {
      let rawValue = document.getElementById("totalSales").value.replace(/,/g, "");
      let totalSale = parseFloat(rawValue);

      if (isNaN(totalSale) || totalSale <= 0) {
        alert("Please enter a valid amount");
        return;
      }

      let rate = parseFloat(document.getElementById("ewtRate").value);

      let vatable = totalSale / 1.12;
      let vat = totalSale - vatable;
      let ewt = vatable * rate;
      let finalCR = totalSale - ewt;

      document.getElementById("vatable").textContent = formatPeso(vatable);
      document.getElementById("vat").textContent = formatPeso(vat);
      document.getElementById("total").textContent = formatPeso(totalSale);
      document.getElementById("ewt").textContent = formatPeso(ewt);
      document.getElementById("final").textContent = formatPeso(finalCR);
      document.getElementById("finalWords").textContent = numberToWords(finalCR);
    }

     function numberToWords(amount) {
      const ones = ["","One","Two","Three","Four","Five","Six","Seven","Eight","Nine"];
      const teens = ["Ten","Eleven","Twelve","Thirteen","Fourteen","Fifteen","Sixteen","Seventeen","Eighteen","Nineteen"];
      const tens = ["","","Twenty","Thirty","Forty","Fifty","Sixty","Seventy","Eighty","Ninety"];
    
      function convert(num) {
        if (num === 0) return "Zero";
        if (num < 10) return ones[num];
        if (num < 20) return teens[num - 10];
        if (num < 100) return tens[Math.floor(num / 10)] + (num % 10 ? " " + ones[num % 10] : "");
        if (num < 1000) return ones[Math.floor(num / 100)] + " Hundred" + (num % 100 ? " " + convert(num % 100) : "");
        if (num < 1000000) return convert(Math.floor(num / 1000)) + " Thousand" + (num % 1000 ? " " + convert(num % 1000) : "");
        return convert(Math.floor(num / 1000000)) + " Million" + (num % 1000000 ? " " + convert(num % 1000000) : "");
      }
    
      let pesos = Math.floor(amount);
      let cents = Math.round((amount - pesos) * 100);
    
      let words = convert(pesos);
    
      if (cents > 0) {
        words += " and " + String(cents).padStart(2, "0") + "/100";
      }
    
      words += " Pesos Only";
    
      return words;
    }
  </script>

</body>
</html>
